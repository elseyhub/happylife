<DOCTYPE! html>
  <html lang="en">
  <head>
    <title>contact</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body> 
   <section class="contact" id="contact">
    <div class="contact-glow"></div>
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info">
          <div class="section-label">Get In Touch</div>
          <h2 class="section-title">Begin Your <em>Journey Today</em></h2>
          <p>Every great ascent begins with a single step. Reach out and let's walk this road together.</p>
          <div class="contact-details">
            <div class="contact-item">
              <span class="contact-icon">📧</span>
              <span><a href="happylifementors@gmail.com" class="email-link">Email</a></span>
            </div>
            <div class="contact-item">
              <span class="contact-icon">📞</span>
              <span>+254 759561305</span>
            </div>
            <div class="contact-item">
              <span class="contact-icon">📍</span>
              <span>Nairobi, Kenya</span>
            </div>
          </div>
          <div class="social-links">
            <a href="https://wa.me/254759561305" class="social-btn">WhatsApp</a>
            <a href="https://www.tiktok.com/@happyspeakers" class="social-btn">TikTok</a>
            <a href="https://www.linkedin.com/in/elsey-ouma-20b757355" class="social-btn">LinkedIn</a>
          </div>
        </div>
        <form class="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="your@email.com" required />
            </div>
          </div>
          <div class="form-group">
            <label>What are you seeking?</label>
            <select>
              <option value="">Select a service</option>
              <option>1-on-1 Life Coaching</option>
              <option>Mindset Mastery Programme</option>
              <option>Wellness & Balance</option>
              <option>Speaking & Workshops</option>
              <option>Online Masterclasses</option>
              <option>Group Coaching Circles</option>
            </select>
          </div>
          <div class="form-group">
            <label>Your Message</label>
            <textarea rows="5" placeholder="Tell us about where you are and where you want to be..."></textarea>
          </div>
          <button type="submit" class="btn-gold full-width">Send My Message ✦</button>
          <div class="form-success" id="formSuccess">✓ Message sent! We'll be in touch soon.</div>
        </form>
      </div>
    </div>
  </section>
 </body>
  </html>
